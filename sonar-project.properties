sonar.projectKey=deploy-full-stack-mean-application
sonar.projectName=End-to-End Full Stack Mean Application
sonar.projectVersion=1.0
sonar.sources=frontend/src
sonar.exclusions=\
    **/node_modules/**, \
    **/dist/**, \
    **/build/**, \
    **/*.test.js, \
